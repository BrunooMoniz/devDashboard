services:
  dev-dashboard:
    build: .
    container_name: dev-dashboard
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/dashboard.db
    ports:
      - "3000:3000"
    volumes:
      - dashboard-data:/app/data
    networks:
      - vps-net

volumes:
  dashboard-data:

networks:
  vps-net:
    external: true
